# Runs on every commit via the pre-commit framework. Tool config lives in pyproject.toml
# ([tool.ruff], [tool.mypy]). Hooks invoke the tools through uvx so they resolve from the
# same index uv uses (no separate pip env to provision).
#
# One-time setup (per clone):
#   uv tool install pre-commit
#   pre-commit install
# If a global core.hooksPath is set, also: git config --local core.hooksPath .git/hooks
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint + import sort, autofix)
        entry: uvx ruff@0.8.6 check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uvx ruff@0.8.6 format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (static types)
        entry: uvx mypy@1.14.1
        language: system
        pass_filenames: false
        require_serial: true
